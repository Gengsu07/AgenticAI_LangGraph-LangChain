# ============================================================
# Docker Compose — LLM API Server Stack for VPS
# ============================================================
# Usage:
#   docker compose up -d        # Start
#   docker compose down          # Stop
#   docker compose logs -f       # View logs

version: "3.8"

services:
  # --- LangServe API Server ---
  api:
    build: .
    container_name: llm-api-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_WORKERS=2
    deploy:
      resources:
        limits:
          memory: 512M    # Cap memory on VPS
          cpus: "1.5"     # Leave some CPU for OS
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - llm-network

  # --- Nginx Reverse Proxy (optional, recommended) ---
  nginx:
    image: nginx:alpine
    container_name: llm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment below for SSL (use certbot to generate certs)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
