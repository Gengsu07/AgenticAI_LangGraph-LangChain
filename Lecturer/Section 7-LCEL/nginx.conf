# ============================================================
# Nginx Configuration for LangServe API (VPS)
# ============================================================
# Place this in /etc/nginx/conf.d/default.conf
# or mount via Docker Compose

# Rate limiting zone (10 req/sec per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream api_backend {
    server api:8000;
    # Add more servers here for horizontal scaling:
    # server api2:8000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain: server_name api.yourdomain.com;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # --- API Proxy ---
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings (LLM responses can be slow)
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Buffering for large responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # --- Health check (bypass rate limiting) ---
    location /health {
        proxy_pass http://api_backend/health;
        limit_req off;
    }

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
    }

    # Uncomment below for SSL redirect:
    # return 301 https://$server_name$request_uri;
}

